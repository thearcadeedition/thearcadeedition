<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Games - My Game Vault</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/app.css">
</head>
<body>

<header class="site-header" id="site-header">
    <div class="header-inner">
        <a class="wordmark" href="index.html">
            <span class="wordmark-icon">🎮</span>
            <span class="wordmark-text">THE <span class="accent">ARCADE</span> EDITION</span>
        </a>
        <nav class="site-nav">
            <a href="index.html" class="nav-link" data-page="home">Home</a>
            <a href="allgames.html" class="nav-link" data-page="games">All Games</a>
            <a href="disguise.html" class="nav-link active" data-page="disguise">Disguise</a>
        </nav>
        <div class="header-right">
            <button class="search-toggle" id="search-toggle" aria-label="Search">🔍 Search games...</button>
        </div>
    </div>
    <div class="search-dropdown" id="search-dropdown" style="display:none">
        <input id="header-search" type="search" placeholder="Search games..." autocomplete="off" spellcheck="false">
        <div class="search-results" id="search-results"></div>
    </div>
</header>

<main class="disguise-main">
    <canvas id="network-canvas" class="bg-canvas"></canvas>

    <div class="disguise-content">
        <p class="stealth-label">STEALTH MODE</p>
        <h1 class="disguise-title">TAB DISGUISE</h1>
        <p class="disguise-sub">Make your browser tab look like something harmless. Pick a preset or set your own custom text.</p>

        <div class="tab-preview-wrap">
            <div class="fake-browser">
                <div class="fake-header-bar">
                    <div class="fake-tab" id="fake-tab">
                        <img src="favicon.png" id="preview-favicon" alt="Favicon" onerror="this.src='favicon.png'">
                        <span id="preview-title">My Game Vault</span>
                        <span class="fake-close">✕</span>
                    </div>
                </div>
                <div class="fake-bar">
                    <span class="fake-arrows">← → ↻</span>
                    <span class="fake-url" id="preview-url">yourname.github.io/vault</span>
                </div>
            </div>
        </div>

        <p class="disguise-section-label">PRESETS</p>
        <div class="preset-grid" id="preset-grid">
            <button class="preset-btn" data-icon="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" data-name="My Drive - Google Drive">
                <img src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Google Drive">
                <span>GOOGLE DRIVE</span>
            </button>
            <button class="preset-btn" data-icon="https://www.google.com/favicon.ico" data-name="Google">
                <img src="https://www.google.com/favicon.ico" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Google">
                <span>GOOGLE</span>
            </button>
            <button class="preset-btn" data-icon="https://www.khanacademy.org/favicon.ico" data-name="Khan Academy">
                <img src="https://www.khanacademy.org/favicon.ico" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Khan Academy">
                <span>KHAN ACADEMY</span>
            </button>
            <button class="preset-btn" data-icon="https://ssl.gstatic.com/docs/documents/images/kix-favicon-2023q4.ico" data-name="Google Docs">
                <img src="https://ssl.gstatic.com/docs/documents/images/kix-favicon-2023q4.ico" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Google Docs">
                <span>GOOGLE DOCS</span>
            </button>
            <button class="preset-btn" data-icon="https://ssl.gstatic.com/docs/presentations/images/slides-favicon-2023q4.ico" data-name="Google Slides">
                <img src="https://ssl.gstatic.com/docs/presentations/images/slides-favicon-2023q4.ico" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Google Slides">
                <span>GOOGLE SLIDES</span>
            </button>
            <button class="preset-btn" data-icon="https://canvas.instructure.com/favicon.ico" data-name="Canvas LMS">
                <img src="https://canvas.instructure.com/favicon.ico" class="preset-icon" style="width:28px; height:28px; object-fit:contain;" alt="Canvas LMS">
                <span>CANVAS LMS</span>
            </button>
        </div>

        <p class="disguise-section-label">CUSTOM</p>
        <div class="custom-row">
            <input id="custom-title" type="text" placeholder="Enter custom tab title..." class="title-input">
            <button class="apply-btn" id="apply-btn">Apply</button>
        </div>

        <button class="reset-btn" id="reset-btn">↩ Reset to Default</button>
    </div>
</main>

<script src="games.js"></script>
<script src="assets/disguise.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    initNetwork();

    const previewFavicon = document.getElementById('preview-favicon');
    const previewTitle   = document.getElementById('preview-title');
    const customTitle    = document.getElementById('custom-title');

    function updatePreview(iconUrl, name) {
        previewFavicon.src = iconUrl || 'favicon.png';
        previewTitle.textContent = name.slice(0, 24) + (name.length > 24 ? '…' : '');
    }

    // Load saved disguise into preview panel configuration
    const saved = getDisguise();
    if (saved) {
        updatePreview(saved.icon, saved.name);
        customTitle.value = saved.name;
        
        // Highlight active button preset matches on init
        document.querySelectorAll('.preset-btn').forEach(b => {
            if (b.dataset.name === saved.name) b.classList.add('active');
        });
    }

    // Live preview dynamic title inputs
    customTitle.addEventListener('input', () => {
        // Fall back to mask icon if typing custom text
        const currentSaved = getDisguise();
        const activeIcon = currentSaved ? currentSaved.icon : 'favicon.png';
        updatePreview(activeIcon, customTitle.value || 'My Game Vault');
    });

    // Presets configuration trigger
    document.getElementById('preset-grid').addEventListener('click', e => {
        const btn = e.target.closest('.preset-btn');
        if (!btn) return;
        const icon = btn.dataset.icon;
        const name = btn.dataset.name;
        
        customTitle.value = name;
        updatePreview(icon, name);
        applyDisguise(icon, name);
        
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });

    // Apply custom input titles
    document.getElementById('apply-btn').addEventListener('click', () => {
        const name = customTitle.value.trim() || 'My Game Vault';
        const currentSaved = getDisguise();
        // Keep current selected preset logo icon, or default back to vault icon
        const icon = currentSaved ? currentSaved.icon : 'favicon.png';
        
        applyDisguise(icon, name);
        updatePreview(icon, name);
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });

    // Reset action
    document.getElementById('reset-btn').addEventListener('click', () => {
        clearDisguise();
        customTitle.value = '';
        updatePreview('favicon.png', 'My Game Vault');
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });
});
</script>
</body>
</html>
