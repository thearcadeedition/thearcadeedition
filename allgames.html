<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" id="favicon-link">
    <title id="page-title">All Games — My Game Vault</title>
    <link rel="stylesheet" href="assets/app.css">
</head>
<body>

<header class="site-header" id="site-header">
    <div class="header-inner">
        <a class="wordmark" href="index.html">
            <span class="wordmark-icon">🎮</span>
            <span class="wordmark-text">MY <span class="accent">GAME</span> VAULT</span>
        </a>
        <nav class="site-nav">
            <a href="index.html" class="nav-link" data-page="home">Home</a>
            <a href="allgames.html" class="nav-link active" data-page="games">All Games</a>
            <a href="disguise.html" class="nav-link" data-page="disguise">Disguise</a>
        </nav>
        <div class="header-right">
            <button class="search-toggle" id="search-toggle" aria-label="Search">🔍 Search games...</button>
        </div>
    </div>
    <div class="search-dropdown" id="search-dropdown" style="display:none">
        <input id="header-search" type="search" placeholder="Search games..." autocomplete="off" spellcheck="false">
        <div class="search-results" id="search-results"></div>
    </div>
</header>

<main class="allgames-main">
    <h1 class="page-heading">All Games</h1>

    <div class="allgames-controls">
        <input id="inline-search" type="search" placeholder="🎮  Search games..." autocomplete="off" spellcheck="false">
        <button class="search-btn">Search</button>
    </div>

    <div class="tag-filters" id="tag-filters">
        <button class="tag-btn active" data-tag="all">All</button>
        <button class="tag-btn" data-tag="action">⚔️ Action</button>
        <button class="tag-btn" data-tag="puzzle">🧩 Puzzle</button>
        <button class="tag-btn" data-tag="platformer">🏃 Platformer</button>
        <button class="tag-btn" data-tag="racing">🏎️ Racing</button>
        <button class="tag-btn" data-tag="rpg">🗡️ RPG</button>
        <button class="tag-btn" data-tag="sandbox">🏗️ Sandbox</button>
        <button class="tag-btn" data-tag="horror">👻 Horror</button>
        <button class="tag-btn" data-tag="idle">🖱️ Idle</button>
        <button class="tag-btn" data-tag="sports">⚽ Sports</button>
        <button class="tag-btn" data-tag="io">🌐 IO</button>
        <button class="tag-btn" data-tag="multiplayer">👥 Multiplayer</button>
    </div>

    <p id="no-results" class="no-results" style="display:none">No games found. Try a different search!</p>
    <div class="game-grid" id="game-grid"></div>
</main>

<footer class="site-footer">
    <p>My Game Vault — <span id="footer-count"></span> games and counting</p>
</footer>

<script src="games.js"></script>
<script src="assets/disguise.js"></script>
<script src="assets/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('footer-count').textContent = GAMES.length;

    const sorted = [...GAMES].sort((a,b) => a.title.localeCompare(b.title, undefined, {numeric:true}));
    const grid = document.getElementById('game-grid');
    const frag = document.createDocumentFragment();
    sorted.forEach(g => frag.appendChild(buildCard(g)));
    grid.appendChild(frag);

    let activeTag = 'all';
    let query = '';

    // Read tag from URL param
    const urlTag = new URLSearchParams(window.location.search).get('tag');
    if (urlTag) {
        activeTag = urlTag;
        document.querySelectorAll('.tag-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tag === urlTag);
        });
    }

    function filterGames() {
        const q = query.trim().toLowerCase();
        let visible = 0;
        grid.querySelectorAll('.game-link').forEach(a => {
            const title = (a.querySelector('.card-title')?.textContent || '').toLowerCase();
            const file = a.getAttribute('href')?.replace('gamefiles/','') || '';
            const game = GAMES.find(g => g.file === file);
            const gameTags = game?.tags || [];
            const show = (!q || title.includes(q)) && (activeTag === 'all' || gameTags.includes(activeTag));
            a.style.display = show ? '' : 'none';
            if (show) visible++;
        });
        document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
    }

    filterGames();

    document.getElementById('inline-search').addEventListener('input', e => {
        query = e.target.value;
        filterGames();
    });

    document.getElementById('tag-filters').addEventListener('click', e => {
        const btn = e.target.closest('.tag-btn');
        if (!btn) return;
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        filterGames();
    });
});
</script>
</body>
</html>
